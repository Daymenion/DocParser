version: '3.8'

services:
  # vLLM Model Server
  vllm-server:
    image: vllm/vllm-openai:v0.9.1
    container_name: docparser-vllm
    ports:
      - "9998:9998"
    volumes:
      # Download model to local, model url: https://www.modelscope.cn/models/rednote-hilab/dots.ocr
      - ./weights:/workspace/weights
    environment:
      - PYTHONPATH=/workspace/weights:$PYTHONPATH
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              device_ids: ['0']
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -ex
        echo '--- Starting vLLM server for DocParser ---'
        
        # Install required packages
        pip3 install flash_attn==2.8.0.post2 transformers==4.51.3
        
        echo 'Modifying vllm entrypoint...'
        # Patch vllm entrypoint to import custom modeling code
        sed -i '/^from vllm\.entrypoints\.cli\.main import main/a from DotsOCR import modeling_dots_ocr_vllm' $$(which vllm)
        
        echo 'Starting vLLM server...'
        exec vllm serve /workspace/weights/DotsOCR \
            --tensor-parallel-size 1 \
            --gpu-memory-utilization 0.8 \
            --chat-template-content-format string \
            --served-model-name model \
            --trust-remote-code \
            --host 0.0.0.0 \
            --port 9998
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # DocParser Application (API + UI)
  docparser-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: docparser-app
    ports:
      - "7860:7860"    # Combined API + UI
    volumes:
      - ../logs:/app/logs
      - ../temp:/app/temp
    environment:
      - PYTHONPATH=/app
      - VLLM_SERVER=vllm-server:9998
    depends_on:
      vllm-server:
        condition: service_healthy
    command: ["python", "app.py", "--mode", "combined", "--host", "0.0.0.0", "--port", "7860", "--vllm-ip", "vllm-server"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: docparser-network




